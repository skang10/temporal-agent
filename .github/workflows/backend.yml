name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: temporal
          POSTGRES_PASSWORD: temporal
          POSTGRES_DB: temporal_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Lint
        working-directory: backend
        run: uv run ruff check .

      - name: Type check
        working-directory: backend
        run: uv run mypy src/

      - name: Test
        working-directory: backend
        run: uv run pytest --cov=src --cov=api --cov-report=xml
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://temporal:temporal@localhost:5432/temporal_agent_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Security scan
        working-directory: backend
        run: |
          uv export --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
          uvx pip-audit --requirement /tmp/requirements.txt

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build ./backend -t temporal-agent-backend:ci
